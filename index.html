<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK-HOLDINGS</title>
    <style>
        body { background-color: #050505; color: #d4af37; font-family: 'Malgun Gothic', sans-serif; text-align: center; padding-top: 15vh; margin: 0; overflow: hidden; }
        .container { border: 2px solid #d4af37; display: inline-block; padding: 60px 80px; border-radius: 40px; background: linear-gradient(145deg, #1a1a1a, #000); box-shadow: 0 0 50px rgba(212, 175, 55, 0.2); }
        .logo { font-size: 4rem; font-weight: 900; letter-spacing: 12px; margin-bottom: 10px; text-transform: uppercase; }
        .line { border-bottom: 1px solid #d4af37; width: 150px; margin: 25px auto; opacity: 0.6; }
        .slogan { color: #ffffff; font-size: 1.4rem; font-weight: 300; letter-spacing: 2px; margin-top: 20px; }
        .email { margin-top: 60px; color: #888; font-size: 1rem; letter-spacing: 1px; }
        .email strong { color: #d4af37; }
        .btn-group { margin-top: 50px; }
        .btn { display: inline-block; padding: 12px 30px; border: 1px solid #d4af37; color: #d4af37; text-decoration: none; border-radius: 5px; font-size: 0.9rem; transition: 0.4s; margin: 0 10px; }
        .btn:hover { background: #d4af37; color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">HK-HOLDINGS</div>
        <div class="line"></div>
        <div class="slogan">THE ARCHITECTURE OF FUTURE ASSETS</div>
        
        <div class="btn-group">
            <a href="http://hkwb.co.kr" class="btn">HK-WorldBank</a>
            <a href="#" class="btn">HK-ETERNAL-BIO</a>
        </div>

        <div class="email">Official Contact: <strong>info@hkholdings.com</strong></div>
    </div>
</body>
</html>
